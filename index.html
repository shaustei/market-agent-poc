<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NASDAQ-100 Companies</title>
  <style>
    :root{--bg:#121029;--panel:#211b46;--panel-2:#30265f;--ink:#fff7d6;--muted:#b9aee7;--cyan:#4ff4ff;--pink:#ff4fd8;--green:#59ff9c;--yellow:#ffe45c;--red:#ff6b6b;--grid:rgba(255,255,255,.06)}
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0b0920 0%,#171236 55%,#0d1024 100%);color:var(--ink);font-family:"Courier New",Courier,monospace;image-rendering:pixelated;min-height:100vh}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:16px 16px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.9),rgba(0,0,0,.25));}
    header{position:relative;padding:34px 24px 28px;background:var(--panel);border-bottom:6px solid #000;box-shadow:0 6px 0 var(--pink),0 12px 0 #000;text-align:center;overflow:hidden}
    header:before,header:after{content:"";position:absolute;width:14px;height:14px;background:var(--yellow);box-shadow:32px 0 0 var(--cyan),64px 0 0 var(--green),96px 0 0 var(--pink)}
    header:before{left:22px;top:18px}header:after{right:118px;bottom:18px}
    h1{margin:0 0 12px;font-size:clamp(28px,5vw,56px);line-height:1;text-transform:uppercase;letter-spacing:2px;color:var(--yellow);text-shadow:4px 4px 0 #000,8px 8px 0 var(--pink)}
    p{margin:0 auto;color:var(--muted);max-width:900px;font-size:15px;line-height:1.55;text-shadow:2px 2px 0 #000}
    main{position:relative;padding:36px 20px;max-width:1180px;margin:0 auto}
    .bar{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;background:var(--panel);border:4px solid #000;box-shadow:6px 6px 0 #000;padding:14px}
    input{appearance:none;background:#080717;color:var(--green);border:4px solid #000;box-shadow:4px 4px 0 var(--cyan);padding:12px 14px;min-width:min(100%,340px);font:700 14px "Courier New",Courier,monospace;outline:none;text-transform:uppercase}
    input:focus{box-shadow:4px 4px 0 var(--pink)}
    input::placeholder{color:#7a72a8;text-transform:none}
    .status{display:inline-block;font-size:13px;color:var(--yellow);background:#080717;border:3px solid #000;padding:10px 12px;box-shadow:4px 4px 0 var(--green);font-weight:700;text-transform:uppercase}
    .table-wrap{border:5px solid #000;background:#000;box-shadow:8px 8px 0 var(--pink),14px 14px 0 #000;overflow:auto}
    table{width:100%;border-collapse:collapse;background:var(--panel);min-width:760px}
    th,td{padding:14px 16px;border:3px solid #000;text-align:left;font-size:14px;vertical-align:middle}
    th{background:var(--panel-2);color:var(--cyan);font-weight:900;text-transform:uppercase;letter-spacing:1px;position:sticky;top:0;z-index:1;text-shadow:2px 2px 0 #000}
    td{background:#181337;color:var(--ink)}
    tr:nth-child(even) td{background:#201944}
    tr:hover td{background:#33256e;color:#fff;box-shadow:inset 0 0 0 3px var(--yellow)}
    .symbol{font-weight:900;color:var(--green);text-shadow:2px 2px 0 #000;white-space:nowrap}
    .muted{color:var(--muted)}.error{color:var(--red);font-weight:900}
    a{color:var(--cyan);font-weight:900;text-decoration:none;text-shadow:2px 2px 0 #000;word-break:break-word}
    a:hover{color:var(--yellow);background:#000;outline:3px solid var(--pink)}
    .coin{display:inline-block;width:10px;height:10px;margin-right:8px;background:var(--yellow);box-shadow:0 0 0 3px #000,5px 5px 0 #000;vertical-align:middle}
    footer{max-width:1180px;margin:0 auto 28px;padding:0 20px;color:#7f78aa;font-size:12px;text-align:right}
    @media(max-width:700px){header{text-align:left}h1{text-shadow:3px 3px 0 #000,6px 6px 0 var(--pink)}.bar{align-items:stretch}.status{width:100%}}
  </style>
</head>
<body>
<header>
  <h1>NASDAQ-100</h1>
  <p><span class="coin"></span>Company symbols, names and official websites. Live constituent data is loaded from Wikipedia and company websites from Wikidata.</p>
</header>
<main>
  <div class="bar">
    <input id="q" placeholder="Filter by symbol or company…" />
    <span id="status" class="status">Loading constituents…</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Symbol</th><th>Name</th><th>Company website</th></tr></thead>
      <tbody id="rows"><tr><td colspan="3" class="muted">Loading…</td></tr></tbody>
    </table>
  </div>
</main>
<footer>8-bit market board · static Netlify page</footer>
<script>
const WIKI_API='https://en.wikipedia.org/w/api.php';
const WD_API='https://www.wikidata.org/w/api.php';
let companies=[];
const $=id=>document.getElementById(id);
function cleanTitle(s){return (s||'').replace(/\[.*?\]/g,'').trim();}
async function getJson(url){const r=await fetch(url); if(!r.ok) throw new Error(r.status+' '+r.statusText); return r.json();}
async function loadConstituents(){
  const url=`${WIKI_API}?origin=*&action=parse&page=Nasdaq-100&prop=text&format=json`;
  const data=await getJson(url);
  const doc=new DOMParser().parseFromString(data.parse.text['*'],'text/html');
  const tables=[...doc.querySelectorAll('table.wikitable')];
  let best=[];
  for (const table of tables){
    const heads=[...table.querySelectorAll('th')].map(x=>x.textContent.trim().toLowerCase());
    if(heads.some(h=>h.includes('ticker')) && heads.some(h=>h.includes('company'))){
      best=[...table.querySelectorAll('tbody tr')].slice(1).map(tr=>{
        const tds=[...tr.querySelectorAll('td')];
        if(tds.length<2) return null;
        const ticker=cleanTitle(tds[0].textContent);
        const name=cleanTitle(tds[1].textContent);
        const link=tds[1].querySelector('a[href^="/wiki/"]');
        const page=link ? decodeURIComponent(link.getAttribute('href').replace('/wiki/','')) : name;
        return ticker && name ? {ticker,name,page,website:null} : null;
      }).filter(Boolean);
      if(best.length>80) break;
    }
  }
  return best;
}
async function loadWebsite(company){
  try{
    const titles=encodeURIComponent(company.page);
    const e=await getJson(`${WIKI_API}?origin=*&action=query&prop=pageprops&titles=${titles}&format=json`);
    const page=Object.values(e.query.pages)[0];
    const qid=page?.pageprops?.wikibase_item;
    if(!qid) return null;
    const wd=await getJson(`${WD_API}?origin=*&action=wbgetentities&ids=${qid}&props=claims&format=json`);
    const claim=wd.entities?.[qid]?.claims?.P856?.[0]?.mainsnak?.datavalue?.value;
    return claim || null;
  }catch{return null;}
}
function render(){
  const q=$('q').value.trim().toLowerCase();
  const filtered=companies.filter(c=>`${c.ticker} ${c.name}`.toLowerCase().includes(q));
  $('rows').innerHTML=filtered.map(c=>`<tr><td class="symbol">${c.ticker}</td><td>${c.name}</td><td>${c.website?`<a href="${c.website}" target="_blank" rel="noopener">${c.website.replace(/^https?:\/\//,'').replace(/\/$/,'')}</a>`:'<span class="muted">Loading / unavailable</span>'}</td></tr>`).join('') || '<tr><td colspan="3" class="muted">No matches</td></tr>';
  $('status').textContent=`${filtered.length} shown / ${companies.length} constituents`;
}
(async function init(){
  try{
    companies=await loadConstituents();
    render();
    let done=0;
    for(const c of companies){ c.website=await loadWebsite(c); done++; if(done%5===0) render(); }
    render();
  }catch(e){ $('status').innerHTML=`<span class="error">Failed to load data: ${e.message}</span>`; $('rows').innerHTML='<tr><td colspan="3" class="error">Could not load NASDAQ-100 data.</td></tr>'; }
})();
$('q').addEventListener('input',render);
</script>
</body>
</html>
